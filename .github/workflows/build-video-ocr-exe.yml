name: Build Video OCR Extractor EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tesseract OCR (with Korean data)
        shell: pwsh
        run: |
          choco install tesseract -y
          $tessdata = "C:\Program Files\Tesseract-OCR\tessdata"
          Invoke-WebRequest -Uri "https://github.com/tesseract-ocr/tessdata_fast/raw/main/kor.traineddata" -OutFile "$tessdata\kor.traineddata"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Build EXE with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm --clean \
            --name VideoOCRExtractor \
            --onedir \
            --add-data "app.py;." \
            --add-data ".streamlit;.streamlit" \
            --collect-all streamlit \
            --collect-all streamlit_drawable_canvas \
            --collect-all cv2 \
            --collect-all pandas \
            --collect-metadata streamlit \
            --hidden-import pytesseract \
            --hidden-import openpyxl \
            --hidden-import fpdf \
            launcher.py

      - name: Bundle Tesseract next to the EXE
        shell: pwsh
        run: |
          Copy-Item -Recurse "C:\Program Files\Tesseract-OCR" "dist\VideoOCRExtractor\tesseract"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoOCRExtractor-windows
          path: dist/VideoOCRExtractor
